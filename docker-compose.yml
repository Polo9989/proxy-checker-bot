version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; asyncio.run(__import__('aiosqlite').connect('./data/bot.db').__aenter__())"]
      interval: 30s
      timeout: 10s
      retries: 3
